name: ddev-commands
version: 1.3.6
description: "Conjunto de comandos personalizados para Drupal en DDEV."
author: "Óscar Novás <hola@oscarnovas.com>"
maintainer: "Óscar Novás <hola@oscarnovas.com>"
license: "GPL-3.0"

project_files:
  - commands/host/backup
  - commands/web/cr
  - commands/web/grumphp
  - commands/web/lineas
  - commands/web/linkchecker
  - commands/web/phpstan
  - commands/web/phpunit
  - commands/web/rector
  - commands/web/sass
  - config.drupal-tools.yaml
  - web-build/Dockerfile.ddev-drupal-tools
  - agents/

global_files: []

pre_install_actions: []

post_install_actions:
  - |
    _sync_ddev_asset() {
      local src="$1" dst="$2"
      if [ -d "$src" ]; then
        mkdir -p "$dst"
        rsync -av "$src/" "$dst/"
        find "$dst" -type f \( -name '*.md' -o -name '*.ts' \) -exec sed -i '' -e '/#ddev-generated/d' {} \; 2>/dev/null || true
      fi
    }
    _sync_ddev_asset "assets/agents" "../.agents"
    _sync_ddev_asset ".ddev/assets/agents" ".agents"
    _sync_ddev_asset "assets/github" "../.github"
    _sync_ddev_asset ".ddev/assets/github" ".github"
    echo "Assets sincronizados. Tus archivos locales no han sido tocados."
  - echo "Addon ddev-drupal-tools instalado correctamente. Ejecuta 'ddev restart' para aplicar los cambios."

removal_actions:
  - |
    echo "Addon ddev-drupal-tools desinstalado correctamente."
    echo "Las skills otros ajustes de IA NO SE HAN ELIMINADO."
    echo "Si deseas eliminarlos, hazlo manualmente."
