name: ddev-commands
version: 1.3.4
description: "Conjunto de comandos personalizados para Drupal en DDEV."
author: "Óscar Novás <hola@oscarnovas.com>"
maintainer: "Óscar Novás <hola@oscarnovas.com>"
license: "GPL-3.0"

project_files:
  - commands/host/backup
  - commands/host/run
  - commands/web/behat
  - commands/web/cr
  - commands/web/grumphp
  - commands/web/lineas
  - commands/web/linkchecker
  - commands/web/phpstan
  - commands/web/phpunit
  - commands/web/rector
  - commands/web/sass
  - config.drupal-tools.yaml
  - web-build/Dockerfile.ddev-drupal-tools
  - agents/

global_files: []

pre_install_actions: []

post_install_actions:
  - |
    # Detectar si estamos dentro de .ddev o en la raíz
    if [ -d "agents" ]; then
        # Estamos dentro de .ddev
        mkdir -p ../.agents
        rsync -av agents/ ../.agents/
        rm -rf agents
    elif [ -d ".ddev/agents" ]; then
        # Estamos en la raíz del proyecto
        mkdir -p .agents
        rsync -av .ddev/agents/ .agents/
        rm -rf .ddev/agents
    fi

    echo "✅ Skills actualizadas. Tus archivos locales en .agents/ no han sido tocados."
  - echo "Addon ddev-drupal-tools instalado correctamente."
  - echo "Ejecuta 'ddev restart' para aplicar los cambios."

removal_actions:
  - echo "Addon ddev-drupal-tools eliminado."
